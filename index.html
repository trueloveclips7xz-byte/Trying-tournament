<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meri Pehli App</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f4f4; }
        .box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: inline-block; }
        input { padding: 10px; border-radius: 5px; border: 1px solid #ccc; width: 80%; margin-bottom: 10px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🚀 Firebase Database Test</h2>
        <input type="text" id="nameInput" placeholder="Apna Naam Likho">
        <br>
        <button id="sendBtn">Database mein Save Karo</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // ↓↓↓ BHAI, YAHAN APNA CONFIG DALNA HAI ↓↓↓
        const firebaseConfig = {
            // Jo code tune Firebase se copy kiya tha (apiKey wala), 
            // uske andar ki saari lines yahan chipka do.
        };
        // ↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        document.getElementById("sendBtn").onclick = function() {
            const name = document.getElementById("nameInput").value;
            if(name) {
                push(ref(db, 'users/'), { username: name })
                .then(() => alert("Mubarak ho bhai! Data Firebase mein chala gaya!"))
                .catch((error) => alert("Error: " + error));
            } else {
                alert("Pehle naam toh likho!");
            }
        }
    </script>
</body>
</html>
